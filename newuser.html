<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Create Account - NoteApp</title>
    <script defer src="create-user.js"></script>
</head>
<body>
    <div class="auth-container">
        <header>
            <h1>📝 NoteBook</h1>
        </header>

        <main class="auth-main">
            <div class="auth-card">
                <h2>Create New Account</h2>

                <form id="new-user-form">
                    <div class="form-group">
                        <label for="new-username">Username:</label>
                        <input type="text" id="new-username" name="username" placeholder="Choose a username" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="new-password">Password:</label>
                        <input type="password" id="new-password" name="password" placeholder="Choose a password" required>
                    </div>

                    <button type="submit" class="btn-primary">Create Account</button>
                </form>

                <p id="status-message" class="status-message"></p>

                <div class="auth-footer">
                    <p>Already have an account? <a href=${window.location.protocol === "file:" ? "http://localhost:3000" : window.location.origin}/login.html>Login here</a></p>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
