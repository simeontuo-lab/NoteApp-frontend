<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Note-Book</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
</head>
<body>

    <header>
        <div class="header-container">
            <h1>📝 NoteBook</h1>
            <div class="header-right">
                <span id="username-display" class="username-text"></span>
                <button id="logout-btn" class="logout-button">Logout</button>
            </div>
        </div>
    </header>

    <main>
        <form id="note-form" class="note-form">
            <h2>Create a New Note</h2>
            
            <div class="form-group">
                <label href="#title" for="title">Title:</label>
                <input type="text" id="title" name="title" placeholder="Note Title" required>
            </div>

            <div class="form-group">
                <label href="#content" for="content">Content:</label>
                <textarea id="content" name="content" rows="4" placeholder="Write your note here..." required></textarea>
            </div>

            <button type="submit">Save Note</button>
        </form>

        <section aria-label="Saved Notes">
            <ul id="allNotes" class="notes-list">
                <li class="note-item">
                    <article>
                        <header class="note-header">
                            <h3 class="note-title">Sample Note Title</h3>
                            <time datetime="2024-06-01T12:00" class="note-date">2024-06-01 12:00</time>
                        </header>
                        <p class="note-content">This is a sample note content. It can be multiple lines long and will display the full text of the note.</p>            
                    </article>
                </li>
            </ul> 
        </section>
    </main>

</body>
</html>
